# Hunter — Full Deploy Pipeline
#
# Runs on every push to main:
#   1. Supabase DB migrations
#   2. Supabase Edge Functions
#   3. Vercel frontend (production)
#
# TODO: When ready to upgrade, replace steps 1+2 with:
#   - Migrations  → Supabase GitHub App (Dashboard → Settings → Integrations → GitHub)
#   - Frontend    → already handled natively by Vercel GitHub App
#   - Edge funcs  → keep this workflow (no native alternative exists)

name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Migrate · Deploy Functions · Deploy Frontend
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Supabase ────────────────────────────────────────────────
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Run database migrations
        run: supabase db push --linked
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy edge functions
        run: |
          supabase functions deploy \
            generate-content \
            parse-resume \
            interview-coach \
            salary-insights \
            crawl-jobs \
            generate-resume \
            send-notification \
            send-auth-email \
            create-checkout \
            create-portal \
            stripe-webhook \
            match-and-apply \
            recruiter-apply \
            approve-recruiter \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # ── Vercel ──────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Deploy to Vercel
        run: npx vercel --prod --token ${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
