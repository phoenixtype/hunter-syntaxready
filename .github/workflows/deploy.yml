# Hunter — Edge Function Deployment
#
# Migrations: handled natively by the Supabase GitHub App
#   → Dashboard → Settings → Integrations → GitHub → connect repo
#   → Supabase auto-runs `db push` on every merge to main
#
# Frontend: handled natively by the Vercel GitHub App
#   → Vercel is already connected and deploys on every push
#
# This workflow ONLY deploys Supabase Edge Functions (no native auto-deploy exists).
# Required secrets:  SUPABASE_ACCESS_TOKEN  ·  SUPABASE_PROJECT_REF

name: Deploy Edge Functions

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
      - ".github/workflows/deploy.yml"

jobs:
  deploy-functions:
    name: Deploy Supabase Edge Functions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy edge functions
        run: |
          supabase functions deploy \
            generate-content \
            parse-resume \
            interview-coach \
            salary-insights \
            crawl-jobs \
            generate-resume \
            send-notification \
            send-auth-email \
            create-checkout \
            create-portal \
            stripe-webhook \
            match-and-apply \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
