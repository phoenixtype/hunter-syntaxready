<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>hunter.ai | The Agentic Career Platform</title>
    <meta
      name="description"
      content="Hunter AI autonomously manages your job discovery, applications, and interview prep."
    />
    <meta name="author" content="hunter.ai" />
    <meta
      name="keywords"
      content="job search, AI, career, automation, resume, interview prep, job applications"
    />
    <link rel="canonical" href="https://usehunter.app" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Google+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://usehunter.app" />
    <meta property="og:title" content="hunter.ai - Your Career, Autopilot" />
    <meta
      property="og:description"
      content="The agentic AI system that autonomously manages job discovery, applications, and interview prep."
    />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://usehunter.app" />
    <meta name="twitter:title" content="hunter.ai - Your Career, Autopilot" />
    <meta
      name="twitter:description"
      content="The agentic AI system that autonomously manages job discovery, applications, and interview prep."
    />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- PWA / Mobile -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="hunter.ai" />
    <link rel="apple-touch-icon" href="/favicon-192.png" />
    <meta name="theme-color" content="#1a73e8" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>

  <body>
    <script>
      // Global process shim for mobile browser compatibility
      window.process = { env: { NODE_ENV: 'production' } };

      // Global Panic Overlay: display boot errors on screen for mobile debugging
      (function() {
        var root = document.getElementById('root');
        function showError(msg, err) {
          console.error('[PANIC]', msg, err);
          var overlay = document.createElement('div');
          overlay.style = 'position:fixed;top:0;left:0;width:100%;height:100%;background:#fee2e2;color:#991b1b;padding:24px;font-family:monospace;z-index:99999;overflow:auto;';
          overlay.innerHTML = '<h1 style="font-size:20px;margin-bottom:12px;">🚨 Hunter AI Boot Error</h1>' +
            '<p style="font-size:14px;margin-bottom:16px;">The app failed to start. This is usually caused by an incompatible mobile browser or a missing API.</p>' +
            '<div style="background:#fff;padding:12px;border-radius:8px;border:1px solid #f87171;">' +
            '<p><strong>Message:</strong> ' + msg + '</p>' +
            (err && err.stack ? '<pre style="font-size:10px;margin-top:8px;white-space:pre-wrap;">' + err.stack + '</pre>' : '') +
            '</div>' +
            '<button onclick="location.reload()" style="margin-top:16px;background:#991b1b;color:#fff;border:none;padding:8px 16px;border-radius:4px;">Retry Loading</button>';
          document.body.appendChild(overlay);
        }

        window.onerror = function(msg, url, line, col, error) {
          showError(msg + '\n' + url + ':' + line, error);
          return false;
        };
        window.onunhandledrejection = function(event) {
          showError('Promise Rejection: ' + event.reason, event.reason);
        };
      })();
    </script>
    <div id="root"></div>
    <!-- No-flicker theme: run before React paint -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          if (stored === 'dark') {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (_) {}
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
