<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Hunter AI | The Agentic Career Platform</title>
    <meta
      name="description"
      content="Hunter AI autonomously manages your job discovery, applications, and interview prep."
    />
    <meta name="author" content="Hunter AI" />
    <meta
      name="keywords"
      content="job search, AI, career, automation, resume, interview prep, job applications"
    />
    <link rel="canonical" href="https://hunter.syntaxready.com" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Google+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://hunter-ai.app" />
    <meta property="og:title" content="Hunter AI - Your Career, Autopilot" />
    <meta
      property="og:description"
      content="The agentic AI system that autonomously manages job discovery, applications, and interview prep."
    />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://hunter-ai.app" />
    <meta name="twitter:title" content="Hunter AI - Your Career, Autopilot" />
    <meta
      name="twitter:description"
      content="The agentic AI system that autonomously manages job discovery, applications, and interview prep."
    />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- PWA / Mobile -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Hunter" />
    <link rel="apple-touch-icon" href="/favicon-192.png" />
    <meta name="theme-color" content="#1a73e8" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>

  <body>
    <div id="root"></div>
    <!-- No-flicker theme: run before React paint -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          if (stored === 'dark') {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (_) {}
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
